
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: school-management-backend:latest
    container_name: school-management-backend-prod
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - PORT=3000
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: school-management-frontend:latest
    container_name: school-management-frontend-prod
    ports:
      - '80:80'
    environment:
      - VITE_API_URL=${VITE_API_URL}
    restart: always
    depends_on:
      - backend
