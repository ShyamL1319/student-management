version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: student_management_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: examplepassword

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student_management_backend
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://root:examplepassword@mongodb:27017/student_management?authSource=admin
      - PORT=3000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student_management_frontend
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  mongodb_data:
