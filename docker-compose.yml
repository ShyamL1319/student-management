
services:
  mongodb:
    image: mongo:latest
    container_name: school-management-mongodb
    ports:
      - '27018:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: examplepassword

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school-management-backend
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://root:examplepassword@mongodb:27017/school-management?authSource=admin
      - PORT=3000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - ./secrets:/secrets

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school-management-frontend
    ports:
      - '5173:5173'
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - ./secrets:/secrets
    depends_on:
      - backend

volumes:
  mongodb_data:
